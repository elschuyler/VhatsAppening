<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VhatsAppening</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
</head>
<body>
    <div id="viewMain" class="view-active">
        <header class="app-header">
            <h1>VhatsAppening</h1>
            <div class="header-actions">
                <span id="syncStatus">✅</span>
            </div>
        </header>

        <main class="view-container">
            <ul id="nodeList" class="node-list"></ul>
        </main>

        <button id="fabAddNode" class="fab">+</button>
    </div>

    <div id="viewChat" class="view-hidden">
        <header class="app-header">
            <button id="btnBack" class="icon-btn">←</button>
            <h1 id="chatHeaderTitle">Agent</h1>
            <div class="header-actions">
                <span class="status-indicator">🟢 Fast</span>
            </div>
        </header>

        <main id="chatContainer" class="chat-container">
            <div id="messageList" class="message-list"></div>
        </main>

        <footer class="chat-input-area">
            <textarea id="chatInput" placeholder="Message..." rows="1"></textarea>
            <button id="btnSend" class="btn-send">➤</button>
        </footer>
    </div>

    <div id="modalAddNode" class="modal hidden">
        <div class="modal-content">
            <h2>Agent Settings</h2>
            <form id="formAddNode">
                <div class="form-group">
                    <label>Agent Name</label>
                    <input type="text" id="nodeName" required placeholder="e.g., DeepSeek Helper">
                </div>
                <div class="form-group">
                    <label>Base API URL</label>
                    <input type="url" id="nodeBaseUrl" required placeholder="https://api.openai.com/v1">
                    <small class="hint">The endpoint used for /chat/completions</small>
                </div>
                <div class="form-group">
                    <label>Model ID</label>
                    <input type="text" id="nodeModel" required placeholder="e.g., gpt-4o or deepseek-chat">
                </div>
                <div class="form-group">
                    <label>API Key (Secret)</label>
                    <input type="password" id="nodeApiKey" placeholder="Paste key to save/update">
                    <small class="warning-text">Once saved, keys are encrypted and hidden.</small>
                </div>
                <div class="modal-actions">
                    <button type="button" id="btnCancelNode" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Save Agent</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
    </html>
