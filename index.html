<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VhatsAppening</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
</head>
<body>
    <div id="viewMain" class="view-active">
        <header class="app-header">
            <h1>VhatsAppening</h1>
            <div class="header-actions">
                <span id="syncStatus">✅</span>
                <button id="btnSettings" class="icon-btn">⚙️</button>
            </div>
        </header>

        <main class="view-container">
            <ul id="nodeList" class="node-list"></ul>
        </main>

        <button id="fabAddNode" class="fab">+</button>
    </div>

    <div id="viewChat" class="view-hidden">
        <header class="app-header">
            <button id="btnBack" class="icon-btn">←</button>
            <h1 id="chatHeaderTitle">Agent Name</h1>
            <div class="header-actions">
                <span class="status-indicator" id="chatStatus">🟢 Fast</span>
            </div>
        </header>

        <main id="chatContainer" class="chat-container">
            <div id="messageList" class="message-list"></div>
        </main>

        <footer class="chat-input-area">
            <textarea id="chatInput" placeholder="Message..." rows="1"></textarea>
            <button id="btnSend" class="btn-send">➤</button>
        </footer>
    </div>

    <div id="modalAddNode" class="modal hidden">
        <div class="modal-content">
            <h2>AI Agent Settings</h2>
            <form id="formAddNode">
                <div class="form-group">
                    <label for="nodeName">Agent Name</label>
                    <input type="text" id="nodeName" required placeholder="e.g., Helpful Assistant">
                </div>
                <div class="form-group">
                    <label for="nodeProvider">Provider</label>
                    <select id="nodeProvider">
                        <option value="openai">OpenAI</option>
                        <option value="mistral">Mistral</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="nodeModel">Model</label>
                    <input type="text" id="nodeModel" required placeholder="e.g., gpt-4o">
                </div>
                <div class="form-group">
                    <label for="nodeApiKey">API Key</label>
                    <input type="password" id="nodeApiKey" placeholder="sk-... (Leave blank to keep existing)">
                    <small class="warning-text">Encrypted on device. Keys cannot be viewed once saved.</small>
                </div>
                <div class="modal-actions">
                    <button type="button" id="btnCancelNode" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Save Agent</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
                                                          </html>
