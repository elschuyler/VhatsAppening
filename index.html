<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VhatsAppening</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
</head>
<body>
    <header class="app-header">
        <h1>VhatsAppening</h1>
        <div class="header-actions">
            <span id="syncStatus">✅</span>
            <button id="btnSettings" class="icon-btn">⚙️</button>
        </div>
    </header>

    <main id="nodeListView" class="view-container">
        <ul id="nodeList" class="node-list">
            </ul>
    </main>

    <button id="fabAddNode" class="fab">+</button>

    <div id="modalAddNode" class="modal hidden">
        <div class="modal-content">
            <h2>Add AI Agent</h2>
            <form id="formAddNode">
                <div class="form-group">
                    <label for="nodeName">Agent Name</label>
                    <input type="text" id="nodeName" required placeholder="e.g., Helpful Assistant">
                </div>
                <div class="form-group">
                    <label for="nodeProvider">Provider</label>
                    <select id="nodeProvider">
                        <option value="openai">OpenAI</option>
                        <option value="mistral">Mistral</option>
                        <option value="claude">Anthropic Claude</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="nodeModel">Model</label>
                    <input type="text" id="nodeModel" required placeholder="e.g., gpt-4o">
                </div>
                <div class="form-group">
                    <label for="nodeApiKey">API Key</label>
                    <input type="password" id="nodeApiKey" required placeholder="sk-...">
                    <small class="warning-text">Stored locally in plaintext (No-PIN mode)</small>
                </div>
                <div class="modal-actions">
                    <button type="button" id="btnCancelNode" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Save Agent</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Register Service Worker for PWA installability
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered', reg))
                    .catch(err => console.error('Service Worker registration failed', err));
            });
        }
    </script>
</body>
      </html>
