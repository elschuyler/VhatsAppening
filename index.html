<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VhatsAppening</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
</head>
<body>
    <div id="viewMain" class="view">
        <header class="app-header">
            <h1>VhatsAppening</h1>
            <span class="status-badge local-badge">Local Only</span>
        </header>

        <main class="list-container">
            <ul id="nodeList" class="node-list"></ul>
        </main>

        <button id="fabAddNode" class="fab">+</button>
    </div>

    <div id="viewChat" class="view hidden">
        <header class="app-header chat-header">
            <button id="btnBack" class="icon-btn">
                <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"></path></svg>
            </button>
            <div class="header-info">
                <h1 id="chatHeaderTitle">Agent</h1>
                <span class="status-indicator">online</span>
            </div>
        </header>

        <main id="chatContainer" class="chat-container">
            <div id="messageList" class="message-list"></div>
        </main>

        <footer class="chat-footer">
            <div class="input-wrapper">
                <textarea id="chatInput" placeholder="Type a message" rows="1"></textarea>
            </div>
            <button id="btnSend" class="btn-send">
                <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </footer>
    </div>

    <div id="modalAddNode" class="modal hidden">
        <div class="modal-content">
            <h3>Agent Settings</h3>
            <form id="formAddNode">
                <div class="field">
                    <label>Agent Name</label>
                    <input type="text" id="nodeName" required placeholder="e.g. My Assistant">
                </div>
                <div class="field">
                    <label>Base API URL</label>
                    <input type="url" id="nodeBaseUrl" required placeholder="https://api.openai.com/v1">
                </div>
                <div class="field">
                    <label>Model ID / Agent ID</label>
                    <input type="text" id="nodeModel" required placeholder="gpt-4o">
                </div>
                <div class="field">
                    <label>API Key (Encrypted on device)</label>
                    <input type="password" id="nodeApiKey" placeholder="Leave blank to keep existing">
                </div>
                <div class="modal-btns">
                    <button type="button" id="btnCancelNode" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
                        </html>
